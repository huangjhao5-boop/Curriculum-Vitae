          ${p2Rows}
        </table>
        <table class="jis-table" style="margin-bottom:5mm;">
          <colgroup><col class="col-year"><col class="col-month"><col class="col-content"></colgroup>
          <tr style="height:7mm;"><th class="col-year">年</th><th class="col-month">月</th><th class="col-content">免許・資格</th></tr>
          ${p2Skills}
        </table>
        
        <table class="jis-table" style="margin-bottom:5mm;">
          <tr><td class="box-large"><b>志望の動機、特技、好きな学科、アピールポイントなど</b><br><br>${b.motivation||''}</td></tr>
        </table>
        
        <table class="jis-table">
          <tr><td class="box-medium"><b>本人希望記入欄（特に給料・職種・勤務時間・勤務地・その他についての希望などがあれば記入）</b><br><br>${b.desiredConditions||''}</td></tr>
        </table>
      </div>
    </div>`;
  },

  deleteItemPhoto(cat, id) { this.showConfirm("写真を削除しますか？", () => { const i=this.getProfile()[cat].find(x=>x.id===id); if(i) i.photo=null; this.saveData(); this.render(); }); },
  clearAllData() { this.showConfirm("【警告】すべてのデータを完全に消去します。元に戻せません。", () => { localStorage.removeItem(this.DB_KEY); location.reload(); }); }
};
window.onload = () => App.init();
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc, serverTimestamp, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

  const fbConfig = {
    "apiKey": "AIzaSyCU8FG-bGYIm5eX3RbEUNK8_UO3k1oXwyw",
    "authDomain": "curriculum-vitae-76c2b.firebaseapp.com",
    "projectId": "curriculum-vitae-76c2b",
    "storageBucket": "curriculum-vitae-76c2b.firebasestorage.app",
    "messagingSenderId": "556917387273",
    "appId": "1:556917387273:web:9e36b3f666d566e64288d8"
  };

  const app = initializeApp(fbConfig); const auth = getAuth(app); const db = getFirestore(app); 
  const provider = new GoogleAuthProvider();
  provider.setCustomParameters({ prompt: 'select_account' });

  window.CloudSync = { isLoggedIn: false, user: null, pauseSync: false, isPulling: false, isPushingMain: false, isPushingShared: null, unsubShared: {} };

  onAuthStateChanged(auth, async (user) => {
    if (user) { 
      window.CloudSync.isLoggedIn = true; window.CloudSync.user = user; 
      
      if(App.isLocalDefault()) {
          try {
              const s = await getDoc(doc(db, 'users', user.uid, 'life_resume', 'mainData'));
              if(s.exists()) {
                  App.data = JSON.parse(s.data().data);
                  localStorage.setItem(App.DB_KEY, JSON.stringify(App.data));
              }
          } catch(e) {}
      }
      
      window.CloudSync.listenToMainData();
      window.CloudSync.listenToSharedProfiles();

      if(typeof App !== 'undefined' && App.render) App.render();
    } else {
      window.CloudSync.isLoggedIn = false; window.CloudSync.user = null;
      if(window.CloudSync.unsubMain) window.CloudSync.unsubMain();
      Object.keys(window.CloudSync.unsubShared).forEach(k => window.CloudSync.unsubShared[k]());
      window.CloudSync.unsubShared = {};
      
      if(typeof App !== 'undefined' && App.render) App.render();
    }
  });

  window.CloudSync.listenToMainData = () => {
      if(window.CloudSync.unsubMain) return; 
      window.CloudSync.unsubMain = onSnapshot(doc(db, 'users', auth.currentUser.uid, 'life_resume', 'mainData'), (s) => {
          if (window.CloudSync.isPushingMain || window.CloudSync.pauseSync) return;
          if(s.exists()) {
              const cloudData = JSON.parse(s.data().data);
              if (cloudData.settings.lastSync > (App.data.settings.lastSync || 0)) {
                  window.CloudSync.isPulling = true;
                  App.data = cloudData;
                  localStorage.setItem(App.DB_KEY, JSON.stringify(App.data));
                  App.render();
                  window.CloudSync.isPulling = false;
                  window.CloudSync.listenToSharedProfiles(); 
              }
          }
      }, (err) => console.warn("Main sync error:", err));
  };

  window.CloudSync.listenToSharedProfiles = () => {
      Object.values(App.data.profiles).forEach(p => {
          if(p.shareCode && !window.CloudSync.unsubShared[p.shareCode]) {
              window.CloudSync.unsubShared[p.shareCode] = onSnapshot(doc(db, 'shared_profiles', p.shareCode), (s) => {
                  if (window.CloudSync.isPushingShared === p.shareCode) return; 
                  if(s.exists()) {
                      const remoteData = JSON.parse(s.data().data);
                      const localP = App.data.profiles[p.id];
                      if (!localP || remoteData._lastUpdate > (localP._lastUpdate || 0)) {
                          window.CloudSync.isPulling = true;
                          const localId = p.id;
                          App.data.profiles[localId] = { ...remoteData, id: localId, role: localP.role }; 
                          localStorage.setItem(App.DB_KEY, JSON.stringify(App.data));
                          if (App.state.activeProfileId === localId) {
                              App.render();
                          }
                          window.CloudSync.isPulling = false;
                      }
                  }
              }, (err) => console.warn("Shared sync error:", err));
          }
      });
  };

  window.CloudSync.login = async () => {
      try {
          const result = await signInWithPopup(auth, provider);
          await window.CloudSync.checkConflict(result.user);
      } catch(e) {
          if (e.code !== 'auth/popup-closed-by-user') alert(e.message);
      }
  };

  window.CloudSync.checkConflict = async (user) => {
      App.state.dialog = { type: 'loading', message: 'クラウドデータを確認中...' };
      App.render();
      try {
          const s = await getDoc(doc(db, 'users', user.uid, 'life_resume', 'mainData'));
          if (s.exists()) {
              const cloudData = JSON.parse(s.data().data);
              if (App.isLocalDefault()) {
                  App.data = cloudData;
                  localStorage.setItem(App.DB_KEY, JSON.stringify(cloudData));
                  App.state.dialog = null;
                  App.showAlert("クラウドからデータを自動復元しました。");
              } else {
                  window.CloudSync.pauseSync = true; 
                  App.state.dialog = { type: 'sync_conflict', cloudData: cloudData, message: '⚠️ データの競合を検出しました\n\n現在の端末とクラウドの両方にデータが存在します。\nどちらのデータを優先しますか？' };
                  App.render();
              }
          } else {
              App.state.dialog = null;
              App.showAlert("クラウド連携が完了しました。現在のデータをバックアップします。");
              App.triggerBackgroundSync();
          }
      } catch(e) { App.state.dialog = null; App.showAlert("エラーが発生しました: " + e.message); }
  };
  
  window.CloudSync.logout = () => {
      signOut(auth).then(() => { App.showAlert("Googleアカウントの連携を解除しました。"); }).catch(e => alert(e.message));
  };
  
  window.CloudSync.backup = async (d) => {
    if(!auth.currentUser) return {success:false};
    try { await setDoc(doc(db, 'users', auth.currentUser.uid, 'life_resume', 'mainData'), { data: JSON.stringify(d), ts: serverTimestamp() }); return {success:true}; }
    catch(e){ return {success:false, msg:e.message}; }
  };

  window.CloudSync.updateSharedProfile = async (profileData) => {
      try {
          await setDoc(doc(db, 'shared_profiles', profileData.shareCode), {
              data: JSON.stringify(profileData),
              ts: serverTimestamp()
          }, { merge: true });
      } catch(e) {}
  };

  window.CloudSync.createShareLink = async (profileData) => {
      if(!auth.currentUser) return {success:false};
      try {
          const shareCode = profileData.shareCode;
          await setDoc(doc(db, 'shared_profiles', shareCode), {
              ownerUid: auth.currentUser.uid,
              data: JSON.stringify(profileData),
              ts: serverTimestamp()
          });
          return { success: true, code: shareCode };
      } catch(e) { return { success: false, msg: e.message }; }
  };

  window.CloudSync.fetchSharedProfile = async (code) => {
      if(!auth.currentUser) return {success:false};
      try {
          const s = await getDoc(doc(db, 'shared_profiles', code.toUpperCase()));
          if(s.exists()) { return { success: true, data: JSON.parse(s.data().data) }; }
          return { success: false };
      } catch(e) { return { success: false, msg: e.message }; }
  };
</script>
